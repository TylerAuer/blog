baseUrl = "https://blog.tylerauer.com"
languageCode = "en-us"
title = "Mountains of Code | Tyler Auer"
publishDir = "docs" #docs is the deployment folder for GitHub Pages
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "dracula"
    tabWidth = 4
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true #allows use of html in markdown
  