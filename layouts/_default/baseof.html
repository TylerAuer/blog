<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <link rel="shortcut icon" type="image/png" href="img/favicon.png"> -->
  <!-- Process and load SASS as CSS -->
  {{ $styles := resources.Get "/sass/main.scss" | toCSS | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $styles.Permalink }}" integrity="{{ $styles.Data.Integrity }}" media="screen">
  <title></title>
</head>

<body>
  <div class="container">
    <header class="header">
      <a href="/" class="header__logo">
        MOUNTAINS of CODE
      </a>
      <nav class="header__nav">
        <a class="header__link">Tech</a>
        <a class="header__link">Categories</a>
        <a class="header__link header__link--me">Me</a>
      </nav>
    </header>

    <main>
      {{ block "main" . }}

      {{end}}
    </main>

  </div>
  <footer>
    <div class="footer__icons">
      GitHub, Portfolio, Twitter, Blog, Email
    </div>
    <div class="footer__icons">
      Built by Tyler Auer using Hugo &copy; 2020.
    </div>
  </footer>
</body>

</html>
